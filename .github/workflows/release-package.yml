name: Release Package

# Builds the versioned release tarball from the repo root. (Earlier revisions
# invoked scripts under a nonexistent 'umbrella0.4/**' subtree and never ran.)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example 0.4.1)'
        required: false
        type: string
  push:
    tags:
      - 'v*'
      - 'umbrella0.4-v*'

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build release artifact
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            ./scripts/dist/build-release.sh --version "${{ github.event.inputs.version }}"
          else
            ./scripts/dist/build-release.sh
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: umbrella0.4-release
          # The staging directory also lives under dist/releases; upload only
          # the archive, checksum, and release manifest.
          path: |
            dist/releases/*.tar.gz
            dist/releases/*.sha256
            dist/releases/*.release.json
          if-no-files-found: error
