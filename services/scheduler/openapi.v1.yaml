openapi: 3.1.0
info:
  title: Umbrella Scheduler Service API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8796
paths:
  /v1/scheduler/health:
    get:
      responses:
        '200': { description: OK }
  /v1/scheduler/config:
    get:
      responses:
        '200': { description: Scheduler config }
  /v1/scheduler/compute-ready:
    post:
      responses:
        '200': { description: Ready steps }
  /v1/scheduler/next-batch:
    post:
      responses:
        '200': { description: Selected dispatch batch }
