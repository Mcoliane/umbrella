openapi: 3.1.0
info:
  title: Umbrella Memory Service API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8787
paths:
  /v1/memory/health:
    get:
      summary: Service health
      responses:
        '200':
          description: OK
  /v1/namespaces:
    post:
      summary: Create or upsert namespace
      responses:
        '200':
          description: Namespace
  /v1/namespaces/{namespace}:
    get:
      summary: Get namespace
      parameters:
        - in: path
          name: namespace
          required: true
          schema: { type: string }
      responses:
        '200': { description: Namespace }
        '404': { description: Not found }
  /v1/nodes:
    post:
      summary: Create node
      responses:
        '200': { description: Node }
  /v1/nodes/{node_id}:
    get:
      summary: Get node
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Node }
        '404': { description: Not found }
    patch:
      summary: Update node
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Node }
        '409': { description: Etag conflict }
    delete:
      summary: Soft delete node
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Deleted }
  /v1/nodes/search:
    post:
      summary: Search nodes
      responses:
        '200': { description: Search results }
  /v1/edges/upsert:
    post:
      summary: Upsert edge
      responses:
        '200': { description: Edge }
  /v1/promotions:
    post:
      summary: Promote operational memory-core data into durable node memory
      responses:
        '200': { description: Promotion result }
  /v1/promotions/queue:
    post:
      summary: Enqueue explicit promotion request for asynchronous processing
      responses:
        '200': { description: Promotion queued }
  /v1/promotions/process-queue:
    post:
      summary: Process queued promotion requests and move failures to DLQ
      responses:
        '200': { description: Queue processing report }
  /v1/promotions/replay-dlq:
    post:
      summary: Replay promotion DLQ entries
      responses:
        '200': { description: DLQ replay report }
  /v1/promotions/dlq:
    get:
      summary: List promotion DLQ entries
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        '200': { description: DLQ entries }
  /v1/hydrations/payload:
    post:
      summary: Build explicit hydration payload for writing node knowledge into memory-core (bootstrap/resume only)
      responses:
        '200': { description: Hydration payload }
  /v1/memory/boundary/stats:
    get:
      summary: Boundary observability stats for promotion queue, DLQ, and processed items
      responses:
        '200': { description: Boundary stats }
  /v1/memory/boundary/metrics:
    get:
      summary: Prometheus-style boundary SLO metrics export
      responses:
        '200': { description: Text metrics }
  /v1/events:
    get:
      summary: List events
      parameters:
        - in: query
          name: namespace
          schema: { type: string }
        - in: query
          name: cursor
          schema: { type: integer }
      responses:
        '200': { description: Events }
  /v1/import/removed:
    post:
      summary: Bulk import from canonical setup elements
      responses:
        '200': { description: Import report }
