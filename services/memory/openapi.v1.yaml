openapi: 3.1.0
info:
  title: Umbrella Memory Service API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8787
paths:
  /v1/memory/health:
    get:
      summary: Service health
      responses:
        '200':
          description: OK
  /v1/namespaces:
    post:
      summary: Create or upsert namespace
      responses:
        '200':
          description: Namespace
  /v1/namespaces/{namespace}:
    get:
      summary: Get namespace
      parameters:
        - in: path
          name: namespace
          required: true
          schema: { type: string }
      responses:
        '200': { description: Namespace }
        '404': { description: Not found }
  /v1/nodes:
    post:
      summary: Create node
      responses:
        '200': { description: Node }
  /v1/nodes/{node_id}:
    get:
      summary: Get node
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Node }
        '404': { description: Not found }
    patch:
      summary: Update node
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Node }
        '409': { description: Etag conflict }
    delete:
      summary: Soft delete node
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Deleted }
  /v1/nodes/search:
    post:
      summary: Search nodes
      responses:
        '200': { description: Search results }
  /v1/edges/upsert:
    post:
      summary: Upsert edge
      responses:
        '200': { description: Edge }
  /v1/events:
    get:
      summary: List events
      parameters:
        - in: query
          name: namespace
          schema: { type: string }
        - in: query
          name: cursor
          schema: { type: integer }
      responses:
        '200': { description: Events }
  /v1/import/removed:
    post:
      summary: Bulk import from canonical setup elements
      responses:
        '200': { description: Import report }
