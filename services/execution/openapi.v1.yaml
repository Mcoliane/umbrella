openapi: 3.1.0
info:
  title: Umbrella Execution Service API
  version: 1.0.0
  description: Execution responses may include structured failure fields such as `failureCategory`, `failureSource`, and `failureReason`.
servers:
  - url: http://127.0.0.1:8794
paths:
  /v1/execution/health:
    get:
      responses:
        '200': { description: OK }
  /v1/execution/submit-step-spec:
    post:
      summary: Execute a structured step spec through policy checks, native handlers, or the runtime adapter
      responses:
        '200': { description: Execution result }
  /v1/execution/submit-command:
    post:
      summary: Execute a raw command through the runtime adapter
      responses:
        '200': { description: Execution result }
  /v1/execution/heartbeat:
    post:
      responses:
        '200': { description: Heartbeat result }
  /v1/execution/result:
    post:
      responses:
        '200': { description: Result retrieval }
  /v1/execution/cancel:
    post:
      responses:
        '200': { description: Cancel result }
  /v1/execution/compensate:
    post:
      responses:
        '200': { description: Compensation result }
