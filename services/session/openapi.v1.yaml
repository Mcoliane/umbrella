openapi: 3.1.0
info:
  title: Umbrella Session Service API
  version: 1.9.0
  description: First-class town/session state with a mayor-led town hall, an originator studio for agent/shop creation, reusable shop profiles, governed shop action rosters, session, agent, and sub-agent heartbeat/liveness, first-class sub-agent assignments, and dependency-aware turn orchestration targeted by shop, profile, or role with turn-level dependency policy and retry defaults. Invocation and delegation records include runtime metadata such as `runtimeRequested`, `runtimeResolved`, and `runtimeReason`, and compatibility action ids can resolve into enabled `skill.*` actions while preserving `resolvedActionId` in the session ledger.
servers:
  - url: http://127.0.0.1:8784
paths:
  /v1/session/health:
    get:
      responses:
        '200': { description: OK }
  /v1/shop-profiles:
    get:
      responses:
        '200': { description: Shop profile list }
    post:
      responses:
        '200': { description: Shop profile created or updated }
  /v1/shop-profiles/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Shop profile }
        '404': { description: Not found }
  /v1/sessions:
    post:
      responses:
        '200': { description: Session created }
  /v1/sessions/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Session }
        '404': { description: Not found }
  /v1/sessions/{id}/heartbeat:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Session heartbeat recorded }
  /v1/sessions/{id}/agents/{agentId}/heartbeat:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: agentId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Agent and shop heartbeat recorded }
  /v1/sessions/{id}/sub-agents:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Sub-agent list }
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Sub-agent instantiated for a shop-backed worker }
  /v1/sessions/{id}/sub-agents/{subAgentId}/heartbeat:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: subAgentId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Sub-agent heartbeat recorded }
  /v1/sessions/{id}/assignments:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Sub-agent assignment executed through delegated shop work }
  /v1/sessions/{id}/assignments/{assignmentId}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: assignmentId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Assignment ledger record }
        '404': { description: Not found }
  /v1/sessions/{id}/messages:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Message appended }
  /v1/sessions/{id}/workers:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Worker and shop registered }
  /v1/sessions/{id}/shops/{shopId}/actions/enable:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Shop action enabled through explicit governance }
  /v1/sessions/{id}/shops/{shopId}/actions/disable:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Shop action disabled through explicit governance }
  /v1/sessions/{id}/originations:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Originator-created worker and shop registered }
  /v1/sessions/{id}/turns:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Turn created }
  /v1/sessions/{id}/delegations:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Delegation executed }
  /v1/sessions/{id}/orchestrate-turn:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Fanout orchestration completed with mayor reconciliation }
  /v1/sessions/{id}/invoke-action:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Action invocation result }
  /v1/sessions/{id}/compact:
    post:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Session compaction result }
